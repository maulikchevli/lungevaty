transform:
    train_tf:
        LoadImaged:
            keys: ['image', 'mask', 'annotation']
            allow_missing_keys: True
        EnsureChannelFirstd:
            keys: ['image', 'mask', 'annotation']
            allow_missing_keys: True
        Resized:
            keys: ['image', 'mask', 'annotation']
            mode: ["trilinear", "nearest", "nearest"]
            spatial_size: [160, 240, 128]
            allow_missing_keys: True
        ToDeviced:
            keys: ['image', 'mask', 'annotation']
            allow_missing_keys: True 
            device: "cuda"
        RandFlipd_1:
            keys: ['image', 'mask', 'annotation']
            allow_missing_keys: True
            prob: 0.5
            spatial_axis: 0
        RandFlipd_2:
            keys: ['image', 'mask', 'annotation']
            allow_missing_keys: True
            prob: 0.5
            spatial_axis: 1
        RandFlipd_3:
            keys: ['image', 'mask', 'annotation']
            allow_missing_keys: True
            prob: 0.5
            spatial_axis: 2
        RandRotated:
            keys: ['image', 'mask', 'annotation']
            allow_missing_keys: True
            prob: 0.5
            range_x: 0.2
            range_y: 0.2
            range_z: 0.2
            mode: ['bilinear', 'nearest', 'nearest']
        RandHistogramShiftd:
            keys: ['image']
            prob: 0.75
            num_control_points: [5,8]
        RandGaussianSharpend:
            keys: ['image']
            sigma1_x: [0.1,0.5]
            sigma1_y: [0.1,0.5]
            sigma1_z: [0.1,0.5]
            sigma2_x: 0.3
            sigma2_y: 0.3
            sigma2_z: 0.3
            prob: 0.75
            alpha: [1.5, 10]
        RandGaussianNoised:
            keys: ['image']
            prob: 0.5
            mean: 0
            std: 0.25
        Permuted_our:
            keys: ['image', 'annotation', 'mask']
        Lateralityd_our:
            keys: ['annotation']
            patch_size: [16, 16, 16]
        ToTensord:
            keys: ['image', 'annotation', 'y_mask', 'y_seq']
            allow_missing_keys: True
            track_meta: False
            device: "cuda"
            dtype: bfloat16

    dev_tf:
        LoadImaged:
            keys: ['image', 'mask', 'annotation']
            allow_missing_keys: True
        EnsureChannelFirstd:
            keys: ['image', 'mask', 'annotation']
            allow_missing_keys: True
        Resized:
            keys: ['image', 'mask', 'annotation']
            mode: ["trilinear", "nearest", "nearest"]
            spatial_size: [160, 240, 128]
            allow_missing_keys: True
        Permuted_our:
            keys: ['image', 'annotation', 'mask']
        ToTensord:
            keys: ['image', 'annotation', 'y_mask', 'y_seq']
            allow_missing_keys: True
            track_meta: False
            device: "cuda"
            dtype: bfloat16

    test_tf:
        LoadImaged:
            keys: ['image', 'mask', 'annotation']
            allow_missing_keys: True
        EnsureChannelFirstd:
            keys: ['image', 'mask', 'annotation']
            allow_missing_keys: True
        Resized:
            keys: ['image', 'mask', 'annotation']
            mode: ["trilinear", "nearest", "nearest"]
            spatial_size: [160, 240, 128]
            allow_missing_keys: True
        Permuted_our:
            keys: ['image', 'annotation', 'mask']
        ToTensord:
            keys: ['image', 'annotation', 'y_mask', 'y_seq']
            allow_missing_keys: True
            track_meta: False
            device: "cuda"
            dtype: bfloat16